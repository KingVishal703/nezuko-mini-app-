<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>

<body>

<h2>Withdraw Requests</h2>
<div id="data"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDkdYO6sQvlLu7WRN3zfSLrzGpSzkUl0lg",
  authDomain: "nezuko-earning.firebaseapp.com",
  projectId: "nezuko-earning"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

db.collection("withdraws").onSnapshot(snap=>{
  let html="";
  snap.forEach(doc=>{
    let d = doc.data();
    html += `
      <div>
        ₹${d.amount} - ${d.upi} - ${d.status}
        <button onclick="approve('${doc.id}')">Approve</button>
      </div><hr>
    `;
  });
  document.getElementById("data").innerHTML = html;
});

function approve(id){
  db.collection("withdraws").doc(id).update({
    status:"paid"
  });
}
</script>

</body>
</html>
