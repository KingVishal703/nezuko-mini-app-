<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nezuko Earn</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<script src="config.js"></script>
<script src="firebase.js"></script>
<script src="games.js"></script>
</head>

<body>

<div class="top">
  <h2>💰 ₹<span id="balance">0</span></h2>
</div>

<div class="nav">
  <button onclick="show('tasks')">Tasks</button>
  <button onclick="show('games')">Games</button>
  <button onclick="show('refer')">Refer</button>
  <button onclick="show('withdraw')">Withdraw</button>
</div>

<!-- TASKS -->
<div id="tasks" class="section active">
  <div class="card">
    <h3>🎁 Daily Bonus</h3>
    <button onclick="dailyBonus()">Claim ₹5</button>
  </div>

  <div class="card">
    <h3>📺 Watch Ad</h3>
    <button onclick="watchAd()">Earn ₹2</button>
  </div>
</div>

<!-- GAMES -->
<div id="games" class="section">
  <div class="card"><button onclick="tapGame()">🎯 Tap Game</button></div>
  <div class="card"><button onclick="spinWheel()">🎰 Spin</button></div>
  <div class="card"><button onclick="scratchCard()">💳 Scratch</button></div>
</div>

<!-- REFER -->
<div id="refer" class="section">
  <div class="card">
    <p id="refLink"></p>
    <button onclick="copy()">Copy</button>
  </div>
  <div class="card">
    Referrals: <span id="refs">0</span>
  </div>
</div>

<!-- WITHDRAW -->
<div id="withdraw" class="section">
  <div class="card">
    <input id="upi" placeholder="Enter UPI">
    <button onclick="withdraw()">Withdraw</button>
  </div>
</div>

<script>
let userId = localStorage.getItem("uid");

if(!userId){
  userId = "user_"+Math.floor(Math.random()*999999);
  localStorage.setItem("uid",userId);
}

let balance = 0;

function load(){
  db.ref("users/"+userId).once("value",snap=>{
    if(snap.exists()){
      balance = snap.val().balance || 0;
      document.getElementById("refs").innerText = snap.val().refs || 0;
    }
    update();
  });

  document.getElementById("refLink").innerText =
    location.origin + "?ref=" + userId;
}

function update(){
  document.getElementById("balance").innerText = balance;
  db.ref("users/"+userId).update({balance:balance});
}

function addMoney(x){
  balance += x;
  update();
}

/* TASKS */
function dailyBonus(){
  addMoney(CONFIG.earnings.dailyBonus);
}

function watchAd(){
  // 👉 yaha Adsgram lagana
  addMoney(CONFIG.earnings.adReward);
}

/* REFER */
function copy(){
  navigator.clipboard.writeText(document.getElementById("refLink").innerText);
}

/* WITHDRAW */
function withdraw(){
  if(balance < CONFIG.withdraw.min){
    alert("Min ₹"+CONFIG.withdraw.min);
    return;
  }

  let upi = document.getElementById("upi").value;

  db.ref("withdraws").push({
    user:userId,
    upi:upi,
    amount:balance
  });

  balance = 0;
  update();

  alert("Withdraw Requested");
}

/* NAV */
function show(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

load();
</script>

</body>
</html>
