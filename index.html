<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pro Earn App</title>

<script src="config.js"></script>
<script src="games.js"></script>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<style>
body{margin:0;background:#0f172a;color:white;font-family:sans-serif;}
.nav{display:flex;justify-content:space-around;background:#020617;padding:10px;}
.nav button{background:none;color:white;border:none;}

.section{display:none;padding:10px;}
.active{display:block;}

.card{background:#1e293b;padding:15px;margin:10px;border-radius:10px;}

.btn{width:100%;padding:12px;background:#22c55e;border:none;border-radius:8px;margin-top:10px;color:white;}
</style>
</head>

<body>

<div class="nav">
<button onclick="show('tasks')">Tasks</button>
<button onclick="show('games')">Games</button>
<button onclick="show('withdraw')">Withdraw</button>
</div>

<div id="tasks" class="section active">
<div class="card">
<button class="btn" onclick="dailyBonus()">Daily ₹${CONFIG.earnings.dailyBonus}</button>
<button class="btn" onclick="watchAd()">Watch Ad</button>
</div>
</div>

<div id="games" class="section">
<div class="card">
<button class="btn" onclick="startSnakeGame()">🐍 Snake Game</button>
<button class="btn" onclick="startMemoryGame()">🧠 Memory Game</button>
</div>

<div id="gameArea"></div>
</div>

<div id="withdraw" class="section">
<div class="card">
<input id="upi" placeholder="UPI ID">
<button class="btn" onclick="withdraw()">Withdraw</button>
</div>
</div>

<script>
// Firebase
firebase.initializeApp({
 databaseURL:"https://nezuko-earning-default-rtdb.firebaseio.com"
});
const db=firebase.database();

// Telegram
let tg=window.Telegram.WebApp;
let user=tg.initDataUnsafe?.user || {id:"test",first_name:"Test"};

let userId=user.id;

// Balance
let balance=0;

function loadUser(){
db.ref("users/"+userId).once("value",snap=>{
 if(snap.exists()){
   balance=snap.val().balance||0;
 }else{
   db.ref("users/"+userId).set({balance:0});
 }
});
}

function addMoney(x){
 balance+=x;
 db.ref("users/"+userId).update({balance});
}

// Tasks
function dailyBonus(){
 addMoney(CONFIG.earnings.dailyBonus);
}

async function watchAd(){
 if(CONFIG.ads.adsgram.enable){
   let ad=Adsgram.init({blockId:CONFIG.ads.adsgram.blockId});
   await ad.show();
 }
 addMoney(CONFIG.earnings.adReward);
}

// Withdraw
function withdraw(){
 if(balance < CONFIG.withdraw.min){
   return alert("Min withdraw ₹"+CONFIG.withdraw.min);
 }
 alert("Request sent");
}

// Nav
function show(id){
 document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

// Init
loadUser();

</script>

</body>
</html>
