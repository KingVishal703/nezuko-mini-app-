<!DOCTYPE html>
<html lang="en">
<head>

  <!-- AdsGram SDK -->
  <script src="https://sad.adsgram.ai/js/sad.min.js"></script>

  <!-- Monetag -->
  <script src='//libtl.com/sdk.js' data-zone='10849043' data-sdk='show_10849043'></script>
  
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting...</title>

  <!-- ✅ SAME CSS (unchanged) -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #020617;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      text-align: center;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: radial-gradient(circle at top, #111827 0, #020617 65%, #000 100%);
      border-radius: 18px;
      padding: 20px 18px 18px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.18);
    }
    .step-text { font-size: 12px; letter-spacing: 0.18em; color: #9ca3af; margin-bottom: 8px; }
    h1 { font-size: 18px; font-weight: 600; margin-bottom: 6px; color: #f9fafb; }
    .sub { font-size: 13px; color: #9ca3af; margin-bottom: 14px; }
    .ad-box { border-radius: 14px; border: 1px dashed rgba(148, 163, 184, 0.5); padding: 10px; margin-bottom: 16px; }
    .circle { width: 82px; height: 82px; border-radius: 999px; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; }
    .btn-main { width: 100%; padding: 11px; border-radius: 999px; }
  </style>
</head>

<body>
  <div class="card">

    <div class="step-text" id="step-info">STEP 1 OF 2</div>
    <h1>Secure redirect in progress</h1>

    <div class="circle"><span id="seconds">10</span></div>

    <button class="btn-main" id="action-btn" disabled>WAIT...</button>

  </div>

<script>
// ========== SAME CONFIG ==========
const CONFIG = {
  waitSeconds: 15,
  stepNumber: 1,
  totalSteps: 2,
  isLastPage: false,
  nextPagePath: "step2.html",

  adsgram: {
    interstitial: { blockId: "int-27468", onLoad: false, onClick: false },
    reward: { blockId: "27402", onLoad: false, onClick: false }
  },

  monetag: {
    popupOnLoad: true,
    popupOnClick: false,
    interOnLoad: false,
    interOnClick: true
  },

  directAd: {
    url: "https://omg10.com/4/10850839",
    onLoad: false,
    onClick: false
  }
};

// TIMER (same)
let left = CONFIG.waitSeconds;
const secondsEl = document.getElementById("seconds");
const btn = document.getElementById("action-btn");

const timer = setInterval(() => {
  left--;
  if (left <= 0) {
    clearInterval(timer);
    btn.disabled = false;
    btn.textContent = "NEXT";
  }
  secondsEl.textContent = left;
}, 1000);

// AdsGram
let adsgramInter = null;
let adsgramReward = null;

function initAdsgram() {
  if (!window.Adsgram) return;
  adsgramInter = window.Adsgram.init({ blockId: CONFIG.adsgram.interstitial.blockId });
  adsgramReward = window.Adsgram.init({ blockId: CONFIG.adsgram.reward.blockId });
}

// Monetag
function showMonetagPopup() {
  if (typeof show_10849043 === "function") show_10849043("pop");
}

function showMonetagInterstitial() {
  if (typeof show_10849043 === "function") show_10849043();
}

// Direct Ad
function openDirectAd() {
  if (CONFIG.directAd.url) window.open(CONFIG.directAd.url, "_blank");
}

// LOAD
window.onload = async () => {
  initAdsgram();

  if (CONFIG.monetag.popupOnLoad) showMonetagPopup();
  if (CONFIG.monetag.interOnLoad) showMonetagInterstitial();

  if (CONFIG.directAd.onLoad) openDirectAd();
};

// CLICK
btn.addEventListener("click", async () => {

  if (CONFIG.adsgram.interstitial.onClick && adsgramInter) {
    await adsgramInter.show();
  }

  if (CONFIG.adsgram.reward.onClick && adsgramReward) {
    await adsgramReward.show();
  }

  if (CONFIG.monetag.popupOnClick) showMonetagPopup();
  else if (CONFIG.monetag.interOnClick) showMonetagInterstitial();

  if (CONFIG.directAd.onClick) openDirectAd();

  window.location.href = CONFIG.nextPagePath;
});
</script>

</body>
</html>
