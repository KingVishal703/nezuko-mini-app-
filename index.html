<!DOCTYPE html>
<html>
<head>
  <script src="https://www.monetixads.online/ads.js" data-mxid="MX-D5D6614F"></script>
  <script src='//libtl.com/sdk.js' data-zone='11006692' data-sdk='show_11006692'></script>

  <script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  if (id && id.startsWith("blg2")) {
    if (window.location.hash.includes("tgWebAppData")) {
      window.location.href = "/step1.html?id=" + id + window.location.hash;
    } else {
      window.location.href = "/step1.html?id=" + id;
    }
  }
  </script>
  
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>VIP MINI APP</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://sad.adsgram.ai/js/sad.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>🔥 VIP ONLY </header>

<!-- 🎁 REWARD BUTTON ADDED -->
<div style="padding:10px; text-align:center;">
  <button id="rewardBtn">🎁 Watch Ad & Earn Coins</button>
  <div id="coinBox">Coins: 0</div>
</div>

<input id="search" placeholder="Search..." oninput="searchContent()">

<div class="tabs">
<button class="active" onclick="loadCategory('anime',this)">Anime</button>
<button onclick="loadCategory('movies',this)">Movies</button>
<button onclick="loadCategory('adult',this)">Adult</button>
</div>

<div class="slider" id="slider"></div>

<div class="subtabs" id="subtabs"></div>

<div class="ad">BANNER AD SLOT</div>

<div id="grid"></div>

<div class="ad">INTERSTITIAL AD SLOT</div>

<div id="details" class="modal"></div>

<script src="ads.js"></script>
<script src="app.js"></script>

<script>
Telegram.WebApp.ready();

/* =========================
   💰 COIN SYSTEM
========================= */
function getCoins() {
  return parseInt(localStorage.getItem("coins") || "0");
}

function setCoins(val) {
  localStorage.setItem("coins", val);
  document.getElementById("coinBox").innerText = "Coins: " + val;
}

// init coins UI
setCoins(getCoins());

/* =========================
   🎯 REWARD AD LOGIC
========================= */
document.getElementById("rewardBtn").addEventListener("click", function () {

  // try AdsGram / Monetix / SDK fallback
  if (window.showRewardAd) {

    window.showRewardAd(function(res) {

      if (res.status === "completed") {

        let coins = getCoins() + 10;
        setCoins(coins);

        alert("🎉 You earned 10 coins!");

      } else {
        alert("❌ No reward");
      }

    });

  } else {
    alert("⚠️ Reward ad not available");
  }

});
</script>

</body>
</html>
