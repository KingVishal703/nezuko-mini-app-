<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Play & Earn Hub</title>

  <!-- Telegram WebApp -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Adsgram -->
  <script src="https://sad.adsgram.ai/js/sad.min.js"></script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #fff;
      padding: 16px;
    }

    .container{
      max-width:420px;
      margin:auto;
    }

    .card{
      background:#111827;
      border-radius:16px;
      padding:18px;
      margin-bottom:16px;
      box-shadow:0 10px 25px rgba(0,0,0,0.4);
    }

    h1{
      font-size:20px;
      margin-bottom:6px;
    }

    p{
      font-size:13px;
      color:#9ca3af;
    }

    .btn{
      width:100%;
      margin-top:12px;
      padding:12px;
      border:none;
      border-radius:999px;
      font-weight:600;
      cursor:pointer;
      background:linear-gradient(135deg,#4f46e5,#22c55e);
      color:#fff;
    }

    .btn:active{
      transform:scale(0.97);
    }

    .balance{
      font-size:18px;
      font-weight:600;
      margin-top:8px;
    }

    .task{
      background:#020617;
      padding:12px;
      border-radius:12px;
      margin-top:10px;
    }

    .task-title{
      font-size:14px;
      font-weight:600;
    }

    .task-reward{
      font-size:12px;
      color:#22c55e;
    }

    .footer{
      text-align:center;
      font-size:11px;
      color:#6b7280;
      margin-top:10px;
    }
  </style>
</head>

<body>
<div class="container">

  <!-- Header -->
  <div class="card">
    <h1>🎮 Play & Earn</h1>
    <p>Complete simple tasks & earn rewards instantly</p>
    <div class="balance">💰 Balance: ₹<span id="balance">0</span></div>
  </div>

  <!-- Task 1 -->
  <div class="card">
    <div class="task">
      <div class="task-title">📺 Watch Ad</div>
      <div class="task-reward">Earn ₹2</div>
      <button class="btn" onclick="watchAd()">Watch Now</button>
    </div>

    <div class="task">
      <div class="task-title">🎯 Daily Bonus</div>
      <div class="task-reward">Earn ₹5</div>
      <button class="btn" onclick="dailyBonus()">Claim</button>
    </div>
  </div>

  <!-- Withdraw -->
  <div class="card">
    <div class="task-title">💳 Withdraw</div>
    <p>Minimum ₹50 required</p>
    <button class="btn" onclick="withdraw()">Withdraw Now</button>
  </div>

  <div class="footer">
    Secure • Trusted • Fast Payments
  </div>

</div>

<script>
  let balance = 0;

  // Adsgram init
  let ad = null;
  window.onload = () => {
    if (window.Adsgram) {
      ad = window.Adsgram.init({ blockId: "YOUR_BLOCK_ID" });
    }
  };

  function updateBalance(amount){
    balance += amount;
    document.getElementById("balance").innerText = balance;
  }

  async function watchAd(){
    if (!ad) return alert("Ad not loaded");

    try{
      await ad.show();
      updateBalance(2);
    }catch(e){
      console.log(e);
    }
  }

  function dailyBonus(){
    updateBalance(5);
    alert("Bonus claimed!");
  }

  function withdraw(){
    if(balance < 50){
      alert("Minimum ₹50 required");
      return;
    }
    alert("Withdrawal request submitted!");
  }

  // Telegram ready
  if (window.Telegram.WebApp) {
    Telegram.WebApp.expand();
  }
</script>

</body>
</html>
