<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nezuko Earn</title>

<!-- Adsgram -->
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#020617;
  color:#fff;
  text-align:center;
}
.container{max-width:420px;margin:auto;padding:15px;}
.card{
  background:#0f172a;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}
.btn{
  padding:12px;
  border:none;
  border-radius:10px;
  width:100%;
  margin-top:10px;
  background:#22c55e;
  color:#fff;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>💰 Balance: ₹<span id="balance">0</span></h2>
</div>

<div class="card">
<button class="btn" onclick="showAd()">🎬 Watch Ad +₹5</button>
<button class="btn" onclick="withdraw()">💳 Withdraw</button>
</div>

<div class="card">
<p>Your Referral Link:</p>
<input id="refLink" style="width:100%;padding:10px;border-radius:8px;border:none;">
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDkdYO6sQvlLu7WRN3zfSLrzGpSzkUl0lg",
  authDomain: "nezuko-earning.firebaseapp.com",
  databaseURL: "https://nezuko-earning-default-rtdb.firebaseio.com",
  projectId: "nezuko-earning",
  storageBucket: "nezuko-earning.firebasestorage.app",
  messagingSenderId: "941091730977",
  appId: "1:941091730977:web:931e928cacac8eada49560"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let userId;
let balance = 0;

auth.signInAnonymously().then(res=>{
  userId = res.user.uid;

  let ref = db.collection("users").doc(userId);

  ref.get().then(doc=>{
    if(!doc.exists){
      ref.set({balance:0});
    }else{
      balance = doc.data().balance || 0;
      updateUI();
    }
  });

  // referral
  const urlParams = new URLSearchParams(window.location.search);
  const refId = urlParams.get("ref");

  if(refId && refId !== userId){
    db.collection("users").doc(refId).update({
      balance: firebase.firestore.FieldValue.increment(10)
    });
  }

  document.getElementById("refLink").value =
    window.location.origin + "?ref=" + userId;
});

function updateUI(){
  document.getElementById("balance").innerText = balance;
}

function addMoney(amt){
  balance += amt;
  updateUI();
  db.collection("users").doc(userId).update({balance});
}

// Adsgram
let ad;

window.onload = ()=>{
  if(window.Adsgram){
    ad = window.Adsgram.init({blockId:"YOUR_BLOCK_ID"});
  }
};

function showAd(){
  if(!ad) return alert("Ad not ready");

  ad.show().then(()=>{
    addMoney(5);
    alert("₹5 added");
  });
}

function withdraw(){
  if(balance < 50){
    alert("Min ₹50 required");
    return;
  }

  let upi = prompt("Enter UPI ID");
  if(!upi) return;

  db.collection("withdraws").add({
    userId,
    amount: balance,
    upi,
    status:"pending",
    time: Date.now()
  });

  balance = 0;
  updateUI();

  alert("Withdraw request sent");
}
</script>

</body>
</html>
