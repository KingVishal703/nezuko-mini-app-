<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EarnPro X</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body class="bg-slate-900 text-white">

<div class="max-w-md mx-auto">

<!-- HEADER -->
<div class="p-4 flex justify-between bg-slate-800">
<h2 class="font-bold">⚡ EarnPro</h2>
<div id="balance">₹0</div>
</div>

<!-- NAV -->
<div class="grid grid-cols-4 text-center bg-black">
<button onclick="tab('tasks')">📋</button>
<button onclick="tab('games')">🎮</button>
<button onclick="tab('refer')">👥</button>
<button onclick="tab('wallet')">💳</button>
</div>

<!-- TASKS -->
<div id="tasks" class="p-3">
<div class="bg-slate-800 p-3 rounded mb-3">
<h3>Daily Bonus</h3>
<button onclick="daily()" class="bg-green-500 p-2 mt-2 w-full">Claim + Ad</button>
</div>

<div class="bg-slate-800 p-3 rounded">
<h3>Watch Ad</h3>
<button onclick="watchAd()" class="bg-blue-500 p-2 mt-2 w-full">Watch</button>
</div>
</div>

<!-- GAMES -->
<div id="games" class="hidden p-3">

<div class="bg-slate-800 p-3 rounded mb-3 text-center">
<h3>Tap Game (10s)</h3>
<button onclick="startTap()" class="bg-purple-500 p-2 w-full">Start</button>
<button id="tapBtn" class="bg-blue-600 p-4 mt-2 w-full">TAP</button>
<p id="tapResult"></p>
</div>

<div class="bg-slate-800 p-3 rounded mb-3 text-center">
<h3>Spin Wheel</h3>
<div id="wheel" class="w-40 h-40 mx-auto rounded-full bg-gradient-to-r from-red-500 via-yellow-500 to-green-500"></div>
<button onclick="spin()" class="bg-yellow-500 p-2 w-full mt-2">Spin + Ad</button>
<p id="spinRes"></p>
</div>

<div class="bg-slate-800 p-3 rounded text-center">
<h3>Scratch Card</h3>
<canvas id="scratch" class="w-full h-24 bg-gray-500 rounded"></canvas>
<button onclick="scratchStart()" class="bg-pink-500 p-2 w-full mt-2">Reveal + Ad</button>
<p id="scratchRes"></p>
</div>

</div>

<!-- REFER -->
<div id="refer" class="hidden p-3">
<div class="bg-slate-800 p-3 rounded">
<p id="refLink"></p>
<p>Referrals: <span id="refs">0</span></p>
</div>
</div>

<!-- WALLET -->
<div id="wallet" class="hidden p-3">
<div class="bg-slate-800 p-3 rounded">
<input id="upi" placeholder="UPI ID" class="w-full p-2 text-black">
<button onclick="withdraw()" class="bg-green-600 p-2 mt-2 w-full">Withdraw</button>
</div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
