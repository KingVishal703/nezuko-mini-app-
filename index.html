<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Earn App</title>

  <link rel="stylesheet" href="style.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

  <!-- Telegram WebApp -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div class="app">

  <!-- Header -->
  <div class="header">
    <h2>💰 Earn App</h2>
    <div id="balance">₹0</div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button onclick="showTab('tasks')">📋</button>
    <button onclick="showTab('games')">🎮</button>
    <button onclick="showTab('refer')">👥</button>
    <button onclick="showTab('wallet')">💳</button>
  </div>

  <!-- Tasks -->
  <div id="tasks" class="tab active">
    <div class="card">
      <h3>Daily Bonus</h3>
      <button onclick="claimDaily()">Claim</button>
      <p id="dailyStatus"></p>
    </div>

    <div class="card">
      <h3>Watch Ad</h3>
      <button onclick="watchAd()">Watch</button>
      <p id="adTimer"></p>
    </div>
  </div>

  <!-- Games -->
  <div id="games" class="tab">
    <div class="card">
      <h3>Tap Game</h3>
      <button onclick="startTapGame()">Start</button>
      <p id="tapScore"></p>
    </div>

    <div class="card">
      <h3>Spin Wheel</h3>
      <button onclick="spin()">Spin</button>
      <p id="spinResult"></p>
    </div>

    <div class="card">
      <h3>Scratch Card</h3>
      <canvas id="scratch"></canvas>
      <p id="scratchResult"></p>
    </div>
  </div>

  <!-- Refer -->
  <div id="refer" class="tab">
    <div class="card">
      <p id="refLink"></p>
      <p>Total Referrals: <span id="refCount">0</span></p>
    </div>
  </div>

  <!-- Wallet -->
  <div id="wallet" class="tab">
    <div class="card">
      <input id="upi" placeholder="Enter UPI ID">
      <button onclick="withdraw()">Withdraw</button>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
