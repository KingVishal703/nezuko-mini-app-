<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nezuko Earn Pro</title>

<!-- Adsgram -->
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#020617;
  color:#fff;
  text-align:center;
}
.container{max-width:420px;margin:auto;padding:15px;}
.card{
  background:#0f172a;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}
.btn{
  padding:12px;
  border:none;
  border-radius:10px;
  width:100%;
  margin-top:10px;
  background:#22c55e;
  color:#fff;
  font-weight:bold;
}
.game-btn{
  width:80px;height:80px;
  border-radius:50%;
  background:#22c55e;
  border:none;
  font-size:20px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>💰 ₹<span id="balance">0</span></h2>
</div>

<div class="card">
<button class="btn" onclick="showAd()">🎬 Watch Ad +₹5</button>
<button class="btn" onclick="withdraw()">💳 Withdraw</button>
<button class="btn" onclick="joinChannel()">📢 Join Channel +₹10</button>
</div>

<div class="card">
<h3>🎮 Tap Game</h3>
<p>Tap fast to earn!</p>
<button class="game-btn" onclick="tapGame()">💥</button>
<p>Score: <span id="score">0</span></p>
<button class="btn" onclick="claimGame()">Claim Reward</button>
</div>

<div class="card">
<input id="refLink" style="width:100%;padding:10px;border:none;border-radius:8px;">
</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDkdYO6sQvlLu7WRN3zfSLrzGpSzkUl0lg",
  authDomain: "nezuko-earning.firebaseapp.com",
  projectId: "nezuko-earning"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let userId;
let balance = 0;
let lastAdTime = 0;

// LOGIN
auth.signInAnonymously().then(res=>{
  userId = res.user.uid;

  let ref = db.collection("users").doc(userId);

  ref.get().then(doc=>{
    if(!doc.exists){
      ref.set({balance:0});
    }else{
      balance = doc.data().balance || 0;
      updateUI();
    }
  });

  // referral
  const urlParams = new URLSearchParams(window.location.search);
  const refId = urlParams.get("ref");

  if(refId && refId !== userId){
    db.collection("users").doc(refId).update({
      balance: firebase.firestore.FieldValue.increment(10)
    });
  }

  document.getElementById("refLink").value =
    window.location.origin + "?ref=" + userId;

  setTimeout(dailyBonus,2000);
});

function updateUI(){
  document.getElementById("balance").innerText = balance;
}

// 💰 ADD MONEY
function addMoney(amt){
  balance += amt;
  updateUI();
  db.collection("users").doc(userId).update({balance});
}

// 🎬 Adsgram
let ad;

window.onload = ()=>{
  if(window.Adsgram){
    ad = window.Adsgram.init({blockId:"YOUR_BLOCK_ID"});
  }
};

function canWatchAd(){
  let now = Date.now();
  if(now - lastAdTime < 20000){
    alert("Wait 20 sec");
    return false;
  }
  lastAdTime = now;
  return true;
}

function showAd(){
  if(!ad) return alert("Ad not ready");
  if(!canWatchAd()) return;

  ad.show().then(()=>{
    addMoney(5);
  });
}

// 🎁 DAILY BONUS
function dailyBonus(){
  let today = new Date().toDateString();

  let ref = db.collection("users").doc(userId);

  ref.get().then(doc=>{
    if(doc.data().lastBonus !== today){
      addMoney(5);
      ref.update({lastBonus:today});
      alert("Daily Bonus ₹5");
    }
  });
}

// 📢 JOIN CHANNEL
function joinChannel(){
  window.open("https://t.me/YOUR_CHANNEL","_blank");
  setTimeout(()=>{
    addMoney(10);
  },4000);
}

// 💳 WITHDRAW
function withdraw(){
  if(balance < 50) return alert("Min ₹50");

  let upi = prompt("Enter UPI");
  if(!upi) return;

  db.collection("withdraws").add({
    userId,
    amount:balance,
    upi,
    status:"pending",
    time:Date.now()
  });

  balance = 0;
  updateUI();

  alert("Request sent");
}

// 🎮 GAME
let score = 0;

function tapGame(){
  score++;
  document.getElementById("score").innerText = score;
}

// claim reward with ad
function claimGame(){
  if(score < 10){
    alert("Play more!");
    return;
  }

  if(!ad) return;

  ad.show().then(()=>{
    let reward = Math.floor(score / 10) * 5;
    addMoney(reward);
    alert("Game reward ₹"+reward);
    score = 0;
    document.getElementById("score").innerText = 0;
  });
}
</script>

</body>
</html>
