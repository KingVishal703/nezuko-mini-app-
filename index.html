<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nezuko Earn Pro</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"></script>

<!-- AdsGram -->
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
}

.header {
    padding:15px;
    text-align:center;
    background:#1e293b;
    font-size:18px;
}

.card {
    background:#1e293b;
    margin:10px;
    padding:15px;
    border-radius:10px;
}

.btn {
    width:100%;
    padding:12px;
    border:none;
    background:#22c55e;
    color:white;
    border-radius:8px;
    margin-top:10px;
    font-weight:bold;
}

.game-btn {
    background:#3b82f6;
}
</style>
</head>

<body>

<div class="header">🚀 Nezuko Earn Pro</div>

<div class="card">
👤 User: <span id="username"></span><br>
💰 Balance: ₹<span id="balance">0</span>
</div>

<div class="card">
🎁 Daily Bonus  
<button class="btn" onclick="dailyBonus()">Claim ₹5</button>
</div>

<div class="card">
👥 Invite & Earn  
<p>Your Link:</p>
<input id="refLink" style="width:100%">
</div>

<div class="card">
📺 Watch Ad & Earn  
<button class="btn" onclick="watchAd()">Earn ₹2</button>
</div>

<div class="card">
🎮 Games  
<button class="btn game-btn" onclick="playGame()">Play Game (+₹1)</button>
<button class="btn game-btn" onclick="spin()">Spin Wheel</button>
<button class="btn game-btn" onclick="scratch()">Scratch Card</button>
</div>

<div class="card">
🏆 Leaderboard  
<div id="leaderboard"></div>
</div>

<script>
// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDkdYO6sQvlLu7WRN3zfSLrzGpSzkUl0lg",
  authDomain: "nezuko-earning.firebaseapp.com",
  databaseURL: "https://nezuko-earning-default-rtdb.firebaseio.com",
  projectId: "nezuko-earning",
  storageBucket: "nezuko-earning.firebasestorage.app",
  messagingSenderId: "941091730977",
  appId: "1:941091730977:web:931e928cacac8eada49560"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ✅ Telegram User Detect
const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe?.user;
const userId = user?.id || "guest_" + Math.random();
const username = user?.first_name || "Guest";

document.getElementById("username").innerText = username;

// 🔥 User Data Load
let balance = 0;

function loadUser() {
    db.ref("users/" + userId).once("value", snap => {
        if (snap.exists()) {
            balance = snap.val().balance || 0;
        } else {
            db.ref("users/" + userId).set({
                balance: 0,
                name: username
            });
        }
        updateUI();
    });
}

function updateUI() {
    document.getElementById("balance").innerText = balance;
}

// 💰 Update Balance
function addMoney(amount) {
    balance += amount;
    db.ref("users/" + userId).update({ balance });
    updateUI();
}

// 🎁 Daily Bonus
function dailyBonus() {
    addMoney(5);
}

// 📺 AdsGram
let ad = null;

function initAd() {
    ad = Adsgram.init({ blockId: "27402" });
}

async function watchAd() {
    try {
        await ad.show();
        addMoney(2);
    } catch {}
}

// 🎮 Game
function playGame() {
    addMoney(1);
}

// 🎰 Spin
function spin() {
    const win = Math.floor(Math.random()*10);
    alert("You won ₹" + win);
    addMoney(win);
}

// 💳 Scratch
function scratch() {
    const win = Math.floor(Math.random()*5);
    alert("Scratch Reward ₹" + win);
    addMoney(win);
}

// 🏆 Leaderboard
function loadLeaderboard() {
    db.ref("users").limitToLast(10).on("value", snap => {
        let html = "";
        snap.forEach(user => {
            html += `<div>${user.val().name} - ₹${user.val().balance}</div>`;
        });
        document.getElementById("leaderboard").innerHTML = html;
    });
}

// 👥 Referral
const refLink = `https://t.me/YOUR_BOT?start=${userId}`;
document.getElementById("refLink").value = refLink;

// INIT
loadUser();
loadLeaderboard();
initAd();

</script>

</body>
</html>
