<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Play & Earn Hub</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Adsgram SDK -->
  <script src="https://sad.adsgram.ai/js/sad.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #020617);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 16px;
    }

    .card {
      background: rgba(15, 23, 42, 0.9);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 16px;
    }

    .balance {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      font-size: 14px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #4f46e5, #22c55e);
      color: white;
    }

    .btn-secondary {
      background: #111827;
      color: #9ca3af;
      border: 1px solid #1f2937;
    }

    .task {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      padding: 10px;
      background: #020617;
      border-radius: 10px;
    }

    .task span {
      font-size: 13px;
    }

    .small-btn {
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 8px;
      border: none;
      background: #22c55e;
      color: #fff;
      cursor: pointer;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #6b7280;
      margin-top: 20px;
    }

  </style>
</head>
<body>

  <div class="container">

    <!-- Header -->
    <div class="card">
      <div class="title">🎮 Play & Earn Hub</div>
      <div class="subtitle">Watch ads & complete tasks to earn reward points</div>
    </div>

    <!-- Wallet -->
    <div class="card">
      <div class="balance">₹ <span id="balance">0</span></div>
      <div class="subtitle">Your Reward Balance</div>

      <button class="btn btn-primary" onclick="showAd()">🎬 Watch Ad & Earn</button>
      <button class="btn btn-secondary">💳 Withdraw (Coming Soon)</button>
    </div>

    <!-- Tasks -->
    <div class="card">
      <div class="title">🔥 Daily Tasks</div>

      <div class="task">
        <span>Watch 1 Ad</span>
        <button class="small-btn" onclick="showAd()">+₹5</button>
      </div>

      <div class="task">
        <span>Complete Offer</span>
        <button class="small-btn">+₹10</button>
      </div>

    </div>

    <!-- Footer -->
    <div class="footer">
      © 2026 Play & Earn Hub • All rights reserved
    </div>

  </div>

  <script>
    let balance = 0;

    // Adsgram init
    let AdController = null;

    window.onload = () => {
      if (window.Adsgram) {
        AdController = window.Adsgram.init({
          blockId: "YOUR_BLOCK_ID"
        });
      }
    };

    function showAd() {
      if (!AdController) {
        alert("Ad not ready");
        return;
      }

      AdController.show()
        .then(() => {
          balance += 5;
          document.getElementById("balance").innerText = balance;
          alert("✅ You earned ₹5");
        })
        .catch(() => {
          alert("❌ Ad not available");
        });
    }
  </script>

</body>
</html>
