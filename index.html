<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Play & Earn</title>

  <!-- AdsGram SDK -->
  <script src="https://sad.adsgram.ai/js/sad.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #0f172a;
      font-family: Arial, sans-serif;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .app {
      width: 100%;
      max-width: 400px;
      padding: 20px;
      text-align: center;
      background: #020617;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    .coins {
      font-size: 18px;
      margin: 15px 0;
      color: #22c55e;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      margin-top: 10px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .play {
      background: #4f46e5;
      color: white;
    }

    .watch {
      background: #22c55e;
      color: white;
    }

    .disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    .msg {
      margin-top: 10px;
      font-size: 13px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<div class="app">
  <h1>🎮 Play & Earn</h1>
  <p>Simple game khelo aur coins kamao</p>

  <div class="coins">Coins: <span id="coins">0</span></div>

  <button class="play" onclick="playGame()">Play Game</button>

  <button class="watch" id="adBtn" onclick="watchAd()">Watch Ad + Earn</button>

  <div class="msg" id="msg">Game khelo ya ad dekho aur reward pao</div>
</div>

<script>
let coins = 0;

// AdsGram init
let rewardAd = null;

function initAds() {
  if (!window.Adsgram) return;
  try {
    rewardAd = window.Adsgram.init({
      blockId: "27402" // 👈 apna block id dalna
    });
  } catch (e) {
    console.log(e);
  }
}

window.onload = initAds;

// Game logic
function playGame() {
  let win = Math.random() > 0.5;

  if (win) {
    coins += 5;
    updateCoins();
    showMsg("🎉 You won 5 coins!");
  } else {
    showMsg("😢 You lost, try again!");
  }
}

// Reward Ad
async function watchAd() {
  if (!rewardAd) {
    showMsg("Ad not ready, try again");
    return;
  }

  try {
    await rewardAd.show();
    coins += 10;
    updateCoins();
    showMsg("💰 You earned 10 coins from ad!");
  } catch (e) {
    showMsg("Ad skipped or failed");
  }
}

function updateCoins() {
  document.getElementById("coins").innerText = coins;
}

function showMsg(text) {
  document.getElementById("msg").innerText = text;
}
</script>

</body>
</html>
