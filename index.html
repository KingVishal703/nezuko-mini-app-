<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RewardHub</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family: system-ui;
  background:#0b1220;
  color:#fff;
}

.header{
  padding:20px;
  background:linear-gradient(135deg,#6366f1,#22c55e);
  border-radius:0 0 20px 20px;
}

.balance{
  font-size:24px;
  margin-top:8px;
  font-weight:600;
}

.container{
  padding:16px;
  max-width:500px;
  margin:auto;
}

.card{
  background:#111827;
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
}

.task{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
  background:#020617;
  padding:12px;
  border-radius:12px;
}

.btn{
  border:none;
  padding:8px 14px;
  border-radius:999px;
  background:#22c55e;
  color:#fff;
  cursor:pointer;
}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  max-width:500px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  justify-content:space-around;
  background:#111827;
  padding:10px;
}

.nav button{
  background:none;
  border:none;
  color:#aaa;
}

.nav button.active{
  color:#22c55e;
}

.page{display:none}
.page.active{display:block}
</style>
</head>

<body>

<div class="header">
  <h2>RewardHub</h2>
  <div class="balance">Points: <span id="points">0</span></div>
</div>

<div class="container">

<!-- HOME -->
<div id="home" class="page active">
  <div class="card">
    <h3>Tasks</h3>

    <div class="task">
      <div>
        <b>Watch Sponsored Ad</b><br>
        <small>Earn 10 points</small>
      </div>
      <button class="btn" onclick="watchAd()">Start</button>
    </div>

    <div class="task">
      <div>
        <b>Daily Check-in</b><br>
        <small>Earn 20 points</small>
      </div>
      <button class="btn" onclick="daily()">Claim</button>
    </div>

  </div>
</div>

<!-- WALLET -->
<div id="wallet" class="page">
  <div class="card">
    <h3>Redeem</h3>
    <p>Minimum 500 points</p>
    <button class="btn" onclick="redeem()">Redeem Now</button>
  </div>
</div>

<!-- PROFILE -->
<div id="profile" class="page">
  <div class="card">
    <h3>User Info</h3>
    <p id="user">Loading...</p>
  </div>
</div>

</div>

<div class="nav">
  <button class="active" onclick="nav('home',this)">Home</button>
  <button onclick="nav('wallet',this)">Wallet</button>
  <button onclick="nav('profile',this)">Profile</button>
</div>

<script>
let points = 0;

/* NAV */
function nav(id,btn){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

/* UPDATE */
function addPoints(p){
  points += p;
  document.getElementById("points").innerText = points;
}

/* ADSGRAM */
let ad;
window.onload = () => {
  if(window.Adsgram){
    ad = window.Adsgram.init({ blockId: "YOUR_BLOCK_ID" });
  }

  if(window.Telegram.WebApp){
    const user = Telegram.WebApp.initDataUnsafe?.user;
    if(user){
      document.getElementById("user").innerText =
        user.first_name + " (" + user.id + ")";
    }
  }
};

async function watchAd(){
  if(!ad) return alert("Ad not ready");

  try{
    await ad.show();
    addPoints(10);
  }catch(e){
    console.log(e);
  }
}

/* DAILY */
function daily(){
  addPoints(20);
  alert("Daily reward added");
}

/* REDEEM */
function redeem(){
  if(points < 500){
    alert("Not enough points");
    return;
  }
  alert("Redeem request sent");
}
</script>

</body>
</html>
