<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Earn App Pro</title>

  <link rel="stylesheet" href="style.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <!-- Telegram -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Adsgram Placeholder -->
  <script>
    function showAd(callback){
      // 👉 Adsgram integration here
      console.log("Ad showing...");
      setTimeout(() => {
        console.log("Ad finished");
        callback && callback();
      }, 2500);
    }
  </script>

</head>
<body>

<div class="app">

  <div class="header">
    <h2>⚡ Earn Pro</h2>
    <div id="balance">₹0</div>
  </div>

  <div class="tabs">
    <button onclick="showTab('tasks')">📋</button>
    <button onclick="showTab('games')">🎮</button>
    <button onclick="showTab('refer')">👥</button>
    <button onclick="showTab('wallet')">💳</button>
  </div>

  <!-- TASKS -->
  <div id="tasks" class="tab active">

    <div class="card">
      <h3>🎁 Daily Bonus</h3>
      <button onclick="claimDaily()">Claim + Watch Ad</button>
      <p id="dailyStatus"></p>
    </div>

    <div class="card">
      <h3>📺 Watch Ad</h3>
      <button onclick="watchAd()">Watch & Earn</button>
      <p id="adTimer"></p>
    </div>

  </div>

  <!-- GAMES -->
  <div id="games" class="tab">

    <div class="card center">
      <h3>🔥 Tap Game</h3>
      <p id="tapTimer">Tap fast for 10s!</p>
      <button onclick="startTapGame()">Start Game</button>
      <button id="tapArea" onclick="tapClick()">TAP!</button>
      <p id="tapScore"></p>
    </div>

    <div class="card center">
      <h3>🎡 Spin Wheel</h3>
      <div id="wheel"></div>
      <button onclick="spin()">Spin & Watch Ad</button>
      <p id="spinResult"></p>
    </div>

    <div class="card center">
      <h3>🪙 Scratch Card</h3>
      <canvas id="scratch"></canvas>
      <button onclick="startScratch()">Reveal & Earn</button>
      <p id="scratchResult"></p>
    </div>

  </div>

  <!-- REFER -->
  <div id="refer" class="tab">
    <div class="card">
      <p id="refLink"></p>
      <p>Total Referrals: <span id="refCount">0</span></p>
    </div>
  </div>

  <!-- WALLET -->
  <div id="wallet" class="tab">
    <div class="card">
      <input id="upi" placeholder="Enter UPI ID">
      <button onclick="withdraw()">Withdraw</button>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
